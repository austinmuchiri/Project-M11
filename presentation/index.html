<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=1280"/>
<title>Routine Tracker — Hackcessible 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Nunito+Sans:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500;700;800&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #14201A; --bg-2: #1A2620; --bg-3: #1F2E27;
    --ink: #F4EFE6; --ink-dim: rgba(244,239,230,0.62); --ink-faint: rgba(244,239,230,0.35);
    --brand: #A8C7B8; --brand-deep: #7FA38E; --brand-soft: #D7E4DB;
    --accent: #C99466; --warn: #D69A55; --star: #C99B3F; --info: #6B8DA8;
    --surface: #FFFFFF;
    --font: 'Nunito Sans', system-ui, sans-serif;
    --font-disp: 'Nunito', system-ui, sans-serif;
    --font-mono: 'JetBrains Mono', ui-monospace, monospace;
  }
  html, body { margin: 0; padding: 0; height: 100%; overflow: hidden;
    background: radial-gradient(circle at 30% 0%, #25302C 0%, #14201A 60%);
    color: var(--ink); font-family: var(--font); -webkit-font-smoothing: antialiased; }
  * { box-sizing: border-box; }

  .deck { position: relative; width: 100vw; height: 100vh; overflow: hidden; }
  .slide { position: absolute; inset: 0; overflow-y: auto; padding: 56px 64px;
    opacity: 0; pointer-events: none; transition: opacity .45s ease; }
  .slide.active { opacity: 1; pointer-events: auto; }
  .slide-inner { max-width: 1180px; margin: 0 auto; }

  /* Navigation chrome */
  .topbar { position: fixed; top: 16px; left: 24px; right: 24px;
    display: flex; align-items: center; justify-content: space-between;
    z-index: 100; pointer-events: none; }
  .brand { display: flex; align-items: center; gap: 10px; pointer-events: auto; }
  .brand .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--brand); }
  .brand .name { font-family: var(--font-disp); font-weight: 800; letter-spacing: -0.3px; font-size: 16px; }
  .brand .meta { font-size: 11px; color: var(--ink-dim); font-family: var(--font-mono);
    text-transform: uppercase; letter-spacing: 1.4px; }

  .nav { display: flex; gap: 6px; padding: 6px;
    background: rgba(244,239,230,0.06); border-radius: 12px;
    border: 1px solid rgba(244,239,230,0.08); pointer-events: auto;
    backdrop-filter: blur(8px); }
  .nav button { background: transparent; color: var(--ink-dim); border: none;
    font-family: var(--font); font-size: 11px; font-weight: 700;
    padding: 6px 10px; border-radius: 7px; cursor: pointer; letter-spacing: 0.4px; }
  .nav button.on { background: var(--brand); color: #0F1A14; }

  .progress { position: fixed; bottom: 0; left: 0; right: 0; height: 3px;
    background: rgba(244,239,230,0.05); z-index: 100; }
  .progress > div { height: 100%; background: var(--brand);
    transition: width .35s ease; }

  .footer { position: fixed; bottom: 16px; left: 24px; right: 24px;
    display: flex; align-items: center; justify-content: space-between;
    z-index: 100; font-family: var(--font-mono); font-size: 11px;
    color: var(--ink-faint); pointer-events: none; }
  .footer .keys { pointer-events: auto; }
  .footer kbd { padding: 2px 6px; border-radius: 4px;
    background: rgba(244,239,230,0.06); border: 1px solid rgba(244,239,230,0.12);
    font-family: var(--font-mono); font-size: 10px; }

  /* Typographic primitives */
  h1.tk { font-family: var(--font-disp); font-weight: 900; font-size: 92px;
    line-height: 0.95; letter-spacing: -3px; margin: 0 0 18px; }
  h2.tk { font-family: var(--font-disp); font-weight: 800; font-size: 48px;
    line-height: 1.05; letter-spacing: -1.2px; margin: 0 0 18px; }
  h3.tk { font-family: var(--font-disp); font-weight: 800; font-size: 26px;
    line-height: 1.15; letter-spacing: -0.4px; margin: 0 0 10px; }
  .eyebrow { font-family: var(--font-mono); font-weight: 700; font-size: 12px;
    letter-spacing: 2.4px; text-transform: uppercase; color: var(--brand);
    margin-bottom: 18px; }
  .lead { font-size: 20px; line-height: 1.5; color: var(--ink-dim); max-width: 720px; }

  /* Cards */
  .card { background: rgba(244,239,230,0.04);
    border: 1px solid rgba(244,239,230,0.08);
    border-radius: 18px; padding: 24px; }
  .card.solid { background: var(--bg-3); border-color: rgba(244,239,230,0.10); }
  .card .label { font-size: 11px; font-weight: 800; letter-spacing: 1.4px;
    text-transform: uppercase; color: var(--brand); margin-bottom: 8px; }

  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; }
  .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }

  .pill { display: inline-flex; align-items: center; gap: 6px;
    padding: 5px 12px; border-radius: 999px; font-size: 11px; font-weight: 800;
    letter-spacing: 0.6px; }
  .pill.brand { background: rgba(168,199,184,0.18); color: var(--brand); }
  .pill.warn  { background: rgba(214,154,85,0.18); color: var(--warn); }
  .pill.accent { background: rgba(201,148,102,0.18); color: var(--accent); }

  /* Cover slide */
  .cover { display: flex; flex-direction: column; justify-content: center;
    height: 100%; position: relative; }
  .cover .halo { position: absolute; right: -150px; top: -150px;
    width: 600px; height: 600px; border-radius: 50%;
    background: radial-gradient(circle, rgba(168,199,184,0.18), transparent 60%);
    pointer-events: none; }

  /* System diagram */
  .diagram { display: grid; grid-template-columns: 1fr auto 1fr auto 1fr;
    gap: 16px; align-items: center; margin-top: 32px; }
  .node { background: var(--bg-3); border: 1px solid rgba(244,239,230,0.10);
    border-radius: 16px; padding: 24px; text-align: center; }
  .node .icon { font-size: 36px; margin-bottom: 8px; }
  .node h4 { font-family: var(--font-disp); font-size: 18px; margin: 4px 0;
    font-weight: 800; }
  .node .stack { font-family: var(--font-mono); font-size: 11px;
    color: var(--ink-dim); margin-top: 4px; }
  .arrow { color: var(--brand); font-family: var(--font-mono); font-size: 11px;
    text-align: center; }
  .arrow .line { font-size: 22px; line-height: 1; }

  .center-node { grid-column: 1 / -1; justify-self: center;
    width: 320px; margin-top: 24px; background: rgba(168,199,184,0.10);
    border: 1px solid rgba(168,199,184,0.30); }

  /* Phone mockup */
  .phone { width: 360px; height: 740px; border-radius: 48px;
    background: #0E1311; padding: 12px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5), inset 0 0 0 2px #1F2624; }
  .phone-screen { width: 100%; height: 100%; border-radius: 38px; overflow: hidden;
    background: #F4EFE6; }
  .phone iframe { width: 100%; height: 100%; border: none; }

  /* Watch mockup */
  .watch-frame { width: 100%; height: 820px; border-radius: 16px;
    background: var(--bg); border: 1px solid rgba(244,239,230,0.08); overflow: hidden; }
  .watch-frame iframe { width: 100%; height: 100%; border: none; display: block; }

  /* Laptop mockup */
  .laptop { position: relative; width: 100%; max-width: 800px; margin: 0 auto;
    background: #2A332E; border-radius: 14px 14px 4px 4px; padding: 10px 10px 0;
    border: 1px solid rgba(244,239,230,0.10);
    box-shadow: 0 18px 50px rgba(0,0,0,0.45); }
  .laptop-screen { background: #F4EFE6; border-radius: 8px; height: 460px;
    overflow: hidden; position: relative; }
  .laptop-screen iframe { width: 100%; height: 100%; border: none; }
  .laptop-stand { width: 100%; height: 12px; background: #1F2624;
    border-radius: 0 0 14px 14px; }
  .laptop-tray { position: absolute; right: 12px; bottom: 12px; width: 280px; }

  /* Footnote rows */
  .meta-row { display: flex; gap: 18px; flex-wrap: wrap;
    color: var(--ink-dim); font-size: 13px; line-height: 1.5; }
  .meta-row b { color: var(--ink); }

  /* Code style */
  pre.code { background: #0F1614; border-radius: 10px;
    padding: 16px; font-family: var(--font-mono); font-size: 12px;
    color: #D7E4DB; overflow-x: auto; line-height: 1.6;
    border: 1px solid rgba(244,239,230,0.06); }

  /* Build status */
  .status-row { display: flex; align-items: center; gap: 12px;
    padding: 10px 0; border-bottom: 1px solid rgba(244,239,230,0.06); }
  .status-row:last-child { border-bottom: none; }
  .status-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .status-dot.ok { background: var(--brand); }
  .status-dot.skel { background: var(--accent); }
  .status-row .name { flex: 1; font-weight: 700; font-size: 14px; }
  .status-row .stack { font-size: 11px; color: var(--ink-dim);
    font-family: var(--font-mono); }

  /* Animations */
  @keyframes float-in {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .slide.active .slide-inner > * { animation: float-in .55s cubic-bezier(.2,.8,.3,1) backwards; }
  .slide.active .slide-inner > *:nth-child(2) { animation-delay: 0.07s; }
  .slide.active .slide-inner > *:nth-child(3) { animation-delay: 0.14s; }
  .slide.active .slide-inner > *:nth-child(4) { animation-delay: 0.20s; }
  .slide.active .slide-inner > *:nth-child(5) { animation-delay: 0.26s; }

  ::-webkit-scrollbar { width: 0; height: 0; }
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <span class="dot"></span>
    <div>
      <div class="name">Routine Tracker</div>
      <div class="meta" id="meta-slide">01 / 08</div>
    </div>
  </div>
  <nav class="nav" id="nav"></nav>
</div>

<div class="deck" id="deck"></div>

<div class="progress"><div id="progress-bar"></div></div>

<div class="footer">
  <div>Hackcessible 2026 · Group 1 · M11_design_final</div>
  <div class="keys">
    <kbd>←</kbd> <kbd>→</kbd> nav · <kbd>F</kbd> fullscreen · <kbd>1–8</kbd> jump
  </div>
</div>

<script>
// ─────────────────────────────────────────────────────────
// Slide definitions — each renders into the .deck container
// ─────────────────────────────────────────────────────────
const SLIDES = [
  { id: 'cover',     label: 'Cover'     },
  { id: 'problem',   label: 'Problem'   },
  { id: 'system',    label: 'System'    },
  { id: 'phone',     label: 'Phone'     },
  { id: 'watch',     label: 'Watch'     },
  { id: 'laptop',    label: 'Laptop'    },
  { id: 'data',      label: 'Data'      },
  { id: 'roadmap',   label: 'Status'    },
];

function slideHTML(id) {
  switch (id) {
    case 'cover': return `
      <div class="cover">
        <div class="halo"></div>
        <div class="eyebrow">Hackcessible 2026 · Group 1</div>
        <h1 class="tk">Routine<br/><span style="color:var(--brand)">Tracker</span>.</h1>
        <p class="lead">A gentle, three-screen helper for kids who do better with steady routines.
          One little watch on the wrist, one phone for the grown-up, and a quiet helper on the laptop —
          all working together so mornings feel a bit smoother for everyone. 🌱</p>
        <div class="meta-row" style="margin-top: 36px;">
          <div>⌚ <b>Watch.</b> A soft buzz, a single tap — no words needed.</div>
          <div>📱 <b>Phone.</b> See how the day is going, send a kind nudge.</div>
          <div>💻 <b>Laptop.</b> Notices when focus drifts — never punishes.</div>
        </div>
      </div>
    `;

    case 'problem': return `
      <div class="eyebrow">The problem</div>
      <h2 class="tk">Mornings get lost between "I told them" and "they did it".</h2>
      <p class="lead">Kids on the spectrum often need clear cues, predictable rhythm, and time to switch.
        Verbal reminders alone don't bridge that gap — and once a screen is in the picture, attention drifts in a flash.</p>

      <div class="grid-3" style="margin-top: 32px;">
        <div class="card">
          <div class="label">😓 What usually happens</div>
          <h3 class="tk">Repeating yourself</h3>
          <p style="color: var(--ink-dim); font-size: 14px; line-height: 1.5;">
            "Brush your teeth!" — six times a morning. Voices rise. The day starts on edge,
            and the kid feels it most.
          </p>
        </div>
        <div class="card">
          <div class="label">🚫 Or: lock everything</div>
          <h3 class="tk">Heavy-handed apps</h3>
          <p style="color: var(--ink-dim); font-size: 14px; line-height: 1.5;">
            Tools like Qustodio just block screens. They don't follow routines — they only
            shut things off, which can feel like a punishment.
          </p>
        </div>
        <div class="card">
          <div class="label">🌿 Our take</div>
          <h3 class="tk">Calm, kid-led, transparent</h3>
          <p style="color: var(--ink-dim); font-size: 14px; line-height: 1.5;">
            Watch gives a soft buzz. Grown-up sees what's happening. Laptop only steps in
            during an active task. No yelling, no surprises.
          </p>
        </div>
      </div>
    `;

    case 'system': return `
      <div class="eyebrow">How it fits together</div>
      <h2 class="tk">Three little helpers · one shared notebook.</h2>
      <p class="lead">The watch and the laptop both whisper to a tiny database in the cloud,
        and the phone shows the grown-up what's going on. If the watch is offline, it remembers —
        and catches up the moment it reconnects. Nothing gets lost.</p>

      <div class="diagram">
        <div class="node">
          <div class="icon">⌚</div>
          <h4>Kid Watch</h4>
          <div class="stack">ESP32-S3 · LVGL 9 · BLE 5</div>
          <div style="margin-top: 8px;"><span class="pill brand">8 screens</span></div>
        </div>
        <div class="arrow"><div class="line">⇄</div>BLE</div>
        <div class="node">
          <div class="icon">📱</div>
          <h4>Caregiver Phone</h4>
          <div class="stack">React · Vite · Capacitor</div>
          <div style="margin-top: 8px;"><span class="pill brand">7 screens</span></div>
        </div>
        <div class="arrow"><div class="line">⇄</div>HTTPS</div>
        <div class="node">
          <div class="icon">💻</div>
          <h4>Laptop Monitor</h4>
          <div class="stack">Electron · active-win</div>
          <div style="margin-top: 8px;"><span class="pill brand">tray + lock</span></div>
        </div>
        <div class="node center-node">
          <div class="icon">🗄️</div>
          <h4>Supabase</h4>
          <div class="stack">Postgres · Realtime · Auth · Storage</div>
        </div>
      </div>
    `;

    case 'phone': return `
      <div class="eyebrow">📱 The caregiver phone</div>
      <h2 class="tk">A peaceful look at the day.</h2>
      <p class="lead">No tabs of charts, no walls of text. Just: where is the kid right now, what's next,
        and how is the day going overall. Tap once to send a kind nudge to the watch.</p>

      <div style="display: grid; grid-template-columns: 360px 1fr; gap: 48px; margin-top: 32px; align-items: start;">
        <div class="phone">
          <div class="phone-screen">
            <iframe src="http://localhost:5173" title="Caregiver app"></iframe>
          </div>
        </div>
        <div>
          <h3 class="tk">Seven gentle screens</h3>
          <ul style="font-size: 14px; line-height: 1.9; color: var(--ink-dim); padding-left: 20px;">
            <li><b style="color:var(--ink)">Today</b> — see the watch + laptop in one calm glance</li>
            <li><b style="color:var(--ink)">Schedule</b> — morning, school, evening — gently editable</li>
            <li><b style="color:var(--ink)">Insights</b> — how this week compares, no judgement</li>
            <li><b style="color:var(--ink)">Alerts</b> — only pings after 3 misses in a row</li>
            <li><b style="color:var(--ink)">Settings</b> — quiet hours, haptic-only, miss threshold</li>
            <li><b style="color:var(--ink)">Nudge</b> — "Almost there!" → lands on the watch</li>
            <li><b style="color:var(--ink)">Rewards</b> — stars and little treats kids choose with you</li>
          </ul>
          <div style="margin-top: 24px; padding: 14px 16px; background: rgba(168,199,184,0.10);
                       border: 1px solid rgba(168,199,184,0.20); border-radius: 12px;">
            <div style="color: var(--brand); font-size: 11px; font-weight: 800; letter-spacing: 1.4px;
                        text-transform: uppercase; margin-bottom: 6px;">
              💡 Try it
            </div>
            <div style="font-size: 13px; line-height: 1.6;">
              Open <a href="http://localhost:5173" target="_blank"
                       style="color: var(--brand); text-decoration: none;">localhost:5173</a>
              in a new tab and switch to phone view (DevTools → toggle device toolbar).
            </div>
          </div>
        </div>
      </div>
    `;

    case 'watch': return `
      <div class="eyebrow">⌚ The kid's watch</div>
      <h2 class="tk">Eight calm screens. One thumb. No reading required.</h2>
      <p class="lead">Pictures, not words. Soft buzzes, not alarms. Hold a button to confirm —
        instead of tap-tap-tap, which feels less stressful when little hands are anxious.</p>

      <div class="watch-frame" style="margin-top: 28px;">
        <iframe src="/watch" title="Watch simulator"></iframe>
      </div>

      <div style="margin-top: 18px; display: flex; gap: 18px; align-items: center;
                   font-size: 13px; color: var(--ink-dim);">
        <span>👆 Click the side buttons to step through</span>
        <span>·</span>
        <span>▶ Or hit "Auto-play flow" to watch the whole journey</span>
      </div>
    `;

    case 'laptop': return `
      <div class="eyebrow">💻 The laptop helper</div>
      <h2 class="tk">A quiet little dot in the corner.</h2>
      <p class="lead">It just notices what's on the screen — Roblox, YouTube, Khan Academy, anything —
        and gently lets the grown-up know. During an active task, it can pop up a soft "focus" screen
        until the watch says "done". It doesn't lock things forever, and it doesn't tattle.</p>

      <div class="grid-2" style="margin-top: 32px;">
        <div>
          <h3 class="tk">Tray popup</h3>
          <div style="background: #2A332E; border-radius: 14px; padding: 12px;
                       border: 1px solid rgba(244,239,230,0.08);">
            <div style="background: var(--bg); border-radius: 10px; height: 460px; overflow: hidden;">
              <iframe src="/laptop-popup" style="width: 100%; height: 100%; border: none;"></iframe>
            </div>
          </div>
        </div>
        <div>
          <h3 class="tk">Focus lock during routine</h3>
          <div style="background: #2A332E; border-radius: 14px; padding: 12px;
                       border: 1px solid rgba(244,239,230,0.08);">
            <div style="background: var(--bg); border-radius: 10px; height: 460px; overflow: hidden;">
              <iframe src="/laptop-lock?task=Brush+Teeth&expected=180"
                      style="width: 100%; height: 100%; border: none;"></iframe>
            </div>
          </div>
        </div>
      </div>

      <div class="grid-3" style="margin-top: 32px;">
        <div class="card"><div class="label">Checks in</div><h3 class="tk">Every 2s</h3>
          <p style="color: var(--ink-dim); font-size: 13px;">Looks at the active window, nothing more 👀</p></div>
        <div class="card"><div class="label">Knows the difference</div><h3 class="tk">10 kinds</h3>
          <p style="color: var(--ink-dim); font-size: 13px;">Game · video · school · code · chat · …</p></div>
        <div class="card"><div class="label">Works on</div><h3 class="tk">Any laptop</h3>
          <p style="color: var(--ink-dim); font-size: 13px;">Windows, Mac, Linux, Chromebooks ✓</p></div>
      </div>
    `;

    case 'data': return `
      <div class="eyebrow">🧩 Under the hood</div>
      <h2 class="tk">All three speak the same little language.</h2>
      <p class="lead">A "task event" looks the same whether the watch wrote it, the laptop noticed it,
        or the phone scheduled it. That's why the day on the parent's screen always matches what
        actually happened — there's no translation in between.</p>

      <div class="grid-2" style="margin-top: 28px;">
        <div>
          <h3 class="tk">A task event 🌱</h3>
<pre class="code">{
  kid:     "Munene",
  routine: "Morning",
  task:    "Brush Teeth",
  status:  "done",        // or started / missed / skipped
  who:     "watch",       // watch · phone · laptop
  when:    7:12 AM
}</pre>
          <p style="color: var(--ink-dim); font-size: 13px; margin-top: 12px;">
            That's it. Each surface writes the same shape. The grown-up's dashboard
            just reads them in order.
          </p>
        </div>
        <div>
          <h3 class="tk">Where it all lives 🏡</h3>
<pre class="code">Supabase  (a tiny cloud database)
  ├─ kids          — one per child
  ├─ routines      — morning, school, evening
  ├─ task_events   — what happened, when
  ├─ laptop_signals— what's on screen
  └─ nudges        — kind little messages</pre>
          <div style="margin-top: 16px;">
            <span class="pill brand">🔒 Only you can see your kid's data</span>
            <span class="pill brand">⚡ Live updates in &lt;1s</span>
          </div>
        </div>
      </div>
    `;

    case 'roadmap': return `
      <div class="eyebrow">🌿 Where we are</div>
      <h2 class="tk">What's working today, and what's next.</h2>
      <p class="lead">Three apps you can actually run right now. The watch firmware is ready
        to flash onto real hardware — the demo uses a faithful browser simulator until then.</p>

      <div class="grid-2" style="margin-top: 28px; gap: 36px;">
        <div>
          <h3 class="tk">✅ Running, today</h3>
          <div class="card" style="margin-top: 12px;">
            <div class="status-row">
              <span class="status-dot ok"></span>
              <span class="name">Caregiver phone app</span>
              <span class="stack">7 screens, fully clickable</span>
            </div>
            <div class="status-row">
              <span class="status-dot ok"></span>
              <span class="name">Laptop helper</span>
              <span class="stack">tray icon + focus lock</span>
            </div>
            <div class="status-row">
              <span class="status-dot ok"></span>
              <span class="name">Watch simulator</span>
              <span class="stack">all 8 screens, animated</span>
            </div>
            <div class="status-row">
              <span class="status-dot ok"></span>
              <span class="name">Shared data language</span>
              <span class="stack">phone, laptop, watch agree</span>
            </div>
            <div class="status-row">
              <span class="status-dot ok"></span>
              <span class="name">Demo mode (no internet needed)</span>
              <span class="stack">just open and go</span>
            </div>

// ─────────────────────────────────────────────────────────
// Wiring
// ─────────────────────────────────────────────────────────
const deck = document.getElementById('deck');
const nav = document.getElementById('nav');
const meta = document.getElementById('meta-slide');
const progressBar = document.getElementById('progress-bar');

let current = 0;

SLIDES.forEach((s, i) => {
  const el = document.createElement('section');
  el.className = 'slide';
  el.id = 'slide-' + s.id;
  el.dataset.idx = i;
  el.innerHTML = `<div class="slide-inner">${slideHTML(s.id)}</div>`;
  deck.appendChild(el);

  const btn = document.createElement('button');
  btn.textContent = s.label;
  btn.dataset.idx = i;
  btn.addEventListener('click', () => go(i));
  nav.appendChild(btn);
});

function go(i) {
  current = (i + SLIDES.length) % SLIDES.length;
  document.querySelectorAll('.slide').forEach((el, j) => {
    el.classList.toggle('active', j === current);
  });
  document.querySelectorAll('.nav button').forEach((b, j) => {
    b.classList.toggle('on', j === current);
  });
  meta.textContent = String(current + 1).padStart(2, '0') + ' / ' + String(SLIDES.length).padStart(2, '0');
  progressBar.style.width = ((current + 1) / SLIDES.length * 100).toFixed(1) + '%';
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' || e.key === ' ') go(current + 1);
  if (e.key === 'ArrowLeft') go(current - 1);
  if (e.key === 'Home') go(0);
  if (e.key === 'End') go(SLIDES.length - 1);
  if (e.key.toLowerCase() === 'f') {
    if (document.fullscreenElement) document.exitFullscreen();
    else document.documentElement.requestFullscreen();
  }
  const n = parseInt(e.key, 10);
  if (!isNaN(n) && n >= 1 && n <= SLIDES.length) go(n - 1);
});

go(0);
</script>
