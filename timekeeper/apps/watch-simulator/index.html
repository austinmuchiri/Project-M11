<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=1100"/>
  <title>TimeKeeper · Watch simulator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Nunito+Sans:wght@600;700;800&family=JetBrains+Mono:wght@500;700;800&display=swap" rel="stylesheet"/>
  <style>
    html, body { margin: 0; padding: 0; min-height: 100%;
      background: radial-gradient(circle at 30% 0%, #25302C 0%, #14201A 60%);
      font-family: 'Nunito Sans', system-ui, sans-serif;
      color: #F4EFE6; -webkit-font-smoothing: antialiased;
    }
    * { box-sizing: border-box; }
    @keyframes tk-breathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.04); } }
    @keyframes tk-spin    { to { transform: rotate(360deg); } }
    @keyframes tk-pulse   { 0% { opacity: 1; } 50% { opacity: 0.45; } 100% { opacity: 1; } }
    button:active { transform: scale(0.98); }
    ::-webkit-scrollbar { width: 0; height: 0; }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="./simulator.jsx"></script>
</body>
</html>
