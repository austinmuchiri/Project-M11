<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>TimeKeeper Monitor</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800&family=Nunito+Sans:wght@600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #F4EFE6; --bg-soft: #EDE6DB; --surface: #FFFFFF;
    --ink: #2E2E33; --ink-dim: #8A8A92;
    --brand: #7FA38E; --brand-soft: #D7E4DB; --brand-ink: #1F2E27;
    --accent: #C99466; --warn: #D69A55; --info: #6B8DA8;
    --border: rgba(58,58,63,0.08);
    --font: 'Nunito Sans', system-ui, sans-serif;
    --font-disp: 'Nunito', system-ui, sans-serif;
    --font-mono: 'JetBrains Mono', ui-monospace, monospace;
  }
  html, body { margin: 0; padding: 0; height: 100%; background: var(--bg);
    font-family: var(--font); color: var(--ink); overflow: hidden; }
  body { display: flex; flex-direction: column; }
  header { padding: 14px 16px 10px; display: flex; align-items: center; gap: 10px;
    border-bottom: 1px solid var(--border); -webkit-app-region: drag; }
  header .title { font-family: var(--font-disp); font-weight: 800; font-size: 16px; flex: 1; }
  header .badge { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 1.4px;
    padding: 4px 8px; border-radius: 999px; background: var(--brand-soft); color: var(--brand-ink); }
  main { flex: 1; padding: 14px 16px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
  .row { display: flex; align-items: center; gap: 10px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px; }
  .label { font-size: 10px; color: var(--ink-dim); font-weight: 800; letter-spacing: 1.4px; text-transform: uppercase; }
  .value { font-family: var(--font-disp); font-weight: 800; font-size: 18px; margin-top: 2px; letter-spacing: -0.3px; }
  .meta { font-size: 11px; color: var(--ink-dim); font-family: var(--font-mono); margin-top: 4px; }
  .pill { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 999px;
    background: var(--bg-soft); color: var(--ink); font-size: 11px; font-weight: 700; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--brand);
    box-shadow: 0 0 0 0 var(--brand); animation: pulse 1.8s ease-out infinite; }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(127,163,142,0.5); }
    70% { box-shadow: 0 0 0 6px rgba(127,163,142,0); }
    100% { box-shadow: 0 0 0 0 rgba(127,163,142,0); }
  }
  footer { padding: 10px 16px 14px; border-top: 1px solid var(--border);
    display: flex; gap: 8px; }
  button { -webkit-app-region: no-drag; flex: 1; padding: 8px 12px; border-radius: 8px;
    border: 1px solid var(--border); background: var(--bg-soft); color: var(--ink);
    font-family: var(--font); font-weight: 700; font-size: 12px; cursor: pointer; }
  button.primary { background: var(--brand); color: #fff; border-color: transparent; }
  .cat { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 10px; font-weight: 800;
    text-transform: uppercase; letter-spacing: 1px; font-family: var(--font-mono); }
  .cat.game { background: #F1E2CF; color: #C99466; }
  .cat.video { background: #F1D9D9; color: #C77676; }
  .cat.school { background: var(--brand-soft); color: var(--brand-ink); }
  .cat.code { background: #D6E2EB; color: var(--info); }
  .cat.browser, .cat.system, .cat.other, .cat.social, .cat.writing, .cat.meeting {
    background: var(--bg-soft); color: var(--ink-dim); }
  /* High-contrast styling for the ID display */
  #display-device-id {
    background: var(--bg-soft);
    padding: 12px;
    border-radius: 8px;
    display: inline-block;
    min-width: 80%;
    border: 1px solid var(--border);
  }

  /* Ensure the footer buttons feel disabled when unpaired */
  button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }
</style>
</head>
<body>

<header>
  <div class="title">TimeKeeper Monitor</div>
  <span id="status-badge" class="badge">connecting…</span>
</header>

<main id="root">
  <div id="view-status">
    <div class="card" id="focus-card">
      <div class="label">Foreground app</div>
      <div class="value" id="focus-app">—</div>
      <div class="meta" id="focus-title">no data</div>
      <div style="margin-top: 10px;"><span class="cat" id="focus-cat">other</span></div>
    </div>

    <div class="row" style="gap: 8px; margin-top: 12px;">
      <div class="card" style="flex: 1;">
        <div class="label">Idle</div>
        <div class="value" id="idle-sec">—</div>
        <div class="meta">seconds</div>
      </div>
      <div class="card" style="flex: 1;">
        <div class="label">State</div>
        <div class="value" id="state">—</div>
        <div class="meta" id="state-meta">—</div>
      </div>
    </div>

    <div class="card" style="margin-top: 12px;">
      <div class="row" style="justify-content: space-between;">
        <div>
          <div class="label">Paired with</div>
          <div class="value" id="paired-name">—</div>
        </div>
        <span class="pill"><span class="dot"></span><span id="link-text">linking…</span></span>
      </div>
      <div class="meta" id="device-id">—</div>
    </div>
  </div>

  <div id="view-pair" style="display: none; padding-top: 20px;">
    <div class="card" style="text-align: center; padding: 32px 16px; border: 2px dashed var(--brand-soft);">
      <div class="label" style="margin-bottom: 16px;">Device Pairing ID</div>
      <div class="value" id="display-device-id" style="font-size: 24px; color: var(--brand); letter-spacing: 2px; font-family: var(--font-mono);">
        LOADING... 
      </div>
      <p class="meta" style="margin-top: 20px; line-height: 1.5; font-size: 12px;">
        Open the <b>Caregiver App</b> on your phone,<br/> 
        go to <b>Settings > Pair Device</b>,<br/>
        and enter the code above.
      </p>
    </div>
  </div>
</main>

<footer>
  <button id="btn-test-lock">Test lock</button>
  <button id="btn-unpair">Unpair</button>
  <button id="btn-quit" class="primary">Hide</button>
</footer>

<script>
  const $ = (id) => document.getElementById(id);

  window.tk.onRoute((route) => {
    if (route === 'pair') {
      // Hide the app status, show the pairing screen
      $('focus-card').parentElement.style.display = 'none'; 
      showPairingScreen();
    }
  });

  async function showPairingScreen() {
    const conn = await window.tk.getConnection();
    const root = $('root');
    
    // Replace the UI with the Pairing ID
    root.innerHTML = `
      <div class="card" style="text-align: center; padding: 30px 10px;">
        <div class="label" style="margin-bottom: 12px;">Pairing ID</div>
        <div class="value" style="font-size: 22px; color: var(--brand); font-family: var(--font-mono);">
          ${conn.deviceId}
        </div>
        <div class="meta" style="margin-top: 15px; line-height: 1.4;">
          Enter this code in the Caregiver App<br/>under <b>Settings > Pair Device</b>
        </div>
      </div>
    `;
  }

  async function refresh() {
    const tk = window.tk;
    if (!tk) { $('status-badge').textContent = 'no bridge'; return; }

    const [snap, pairing, conn] = await Promise.all([tk.getSnapshot(), tk.getPairing(), tk.getConnection()]);
    
    if (pairing) {
      // Show Status, Hide Pairing
      $('view-status').style.display = 'block';
      $('view-pair').style.display = 'none';
      
      // Update labels
      $('status-badge').textContent = 'paired';
      $('status-badge').style.background = 'var(--brand-soft)';
      $('paired-name').textContent = pairing.kidName;
      $('device-id').textContent = pairing.deviceId;
      
      // Enable/Disable buttons
      $('btn-unpair').disabled = false;
      $('btn-test-lock').disabled = false;
    } else {
      // Hide Status, Show Pairing
      $('view-status').style.display = 'none';
      $('view-pair').style.display = 'block';
      
      $('status-badge').textContent = 'unpaired';
      $('status-badge').style.background = '#F4E2C9'; // Warning orange
      
      // Fetch and display the ID from the hardware
      const conn = await tk.getConnection();
      $('display-device-id').textContent = conn.deviceId;
      
      // Disable interaction buttons since we aren't linked
      $('btn-unpair').disabled = true;
      $('btn-test-lock').disabled = true;
    }

    if (conn) {
      const dot = $('net-dot');
      const txt = $('net-text');
      if (conn.connected) {
        dot.style.background = 'var(--brand)';
        txt.textContent = 'Supabase connected';
      } else {
        dot.style.background = 'var(--warn)';
        txt.textContent = conn.queued > 0 ? `Offline · ${conn.queued} buffered` : 'Offline';
      }
    }

    if (snap) {
      const f = snap.focus;
      $('focus-app').textContent = f ? f.app : 'idle';
      $('focus-title').textContent = f?.title || (f ? '' : 'nothing in focus');
      const cat = f?.category || 'other';
      const catEl = $('focus-cat');
      catEl.textContent = cat;
      catEl.className = 'cat ' + cat;
      $('idle-sec').textContent = String(snap.idleSec);
      $('state').textContent = snap.locked ? 'locked' : 'awake';
      $('state-meta').textContent = snap.locked ? 'screen locked' : 'normal';
    } else {
      $('focus-app').textContent = 'starting…';
      $('focus-title').textContent = '';
    }

    // Update Foreground App stats if paired
    if (snap && pairing) {
      $('focus-app').textContent = snap.focus?.app || 'idle';
      $('idle-sec').textContent = snap.idleSec;
      // ... rest of your snap updates ...
    }
  }

  $('btn-test-lock').addEventListener('click', () => window.tk.showLock('Brush Teeth', 180));
  $('btn-unpair').addEventListener('click', () => window.tk.unpair());
  $('btn-quit').addEventListener('click', () => window.close());

  refresh();
  setInterval(refresh, 1500);
</script>
</body>
</html>
