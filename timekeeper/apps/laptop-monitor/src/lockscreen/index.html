<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Focus lock</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet"/>
<style>
  html, body { 
    margin: 0; padding: 0; height: 100%; overflow: hidden;
    background: radial-gradient(circle at 50% 30%, #25382E 0%, #1F2E27 60%, #14201A 100%);
    color: #F4EFE6; font-family: 'Nunito', system-ui, sans-serif;
    -webkit-user-select: none; user-select: none; cursor: none; 
  }
  body { 
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 24px; 
  }
  .badge { 
    font-size: 12px; font-weight: 800; text-transform: uppercase;
    letter-spacing: 2px; padding: 6px 14px; border-radius: 999px;
    background: rgba(168,199,184,0.12); color: #A8C7B8; font-family: 'JetBrains Mono', monospace; 
  }
  .task { 
    font-weight: 900; font-size: clamp(60px, 8vw, 110px); letter-spacing: -1.5px;
    line-height: 1; text-align: center; margin-bottom: 20px;
  }
  .hint { 
    font-family: 'JetBrains Mono', monospace; font-size: 14px;
    color: rgba(244,239,230,0.55); letter-spacing: 1px; margin-top: 8px;
    transition: color 0.4s ease; 
  }
  .hint.pending { color: rgba(201,148,102,0.9); }
</style>
</head>
<body>
  <div class="badge">Focus lock · TimeKeeper</div>
  <div class="task" id="task">Loading Task...</div>

  <div class="hint" id="hint">Tap watch → DONE to unlock</div>

<script>
  // 1. Grab task name from URL params
  const params = new URLSearchParams(window.location.search);
  const taskName = params.get('task') || 'Task';
  document.getElementById('task').textContent = taskName;

  // 2. Listen for unlock requests via IPC
  if (window.tk && window.tk.onLockState) {
    window.tk.onLockState(function(state) {
      const hint = document.getElementById('hint');
      if (!hint) return;
      
      if (state === 'pending') {
        hint.textContent = 'Unlock request sent · Waiting for caregiver…';
        hint.classList.add('pending');
      } else {
        hint.textContent = 'Tap watch → DONE to unlock';
        hint.classList.remove('pending');
      }
    });
  }
</script>
</body>
</html>
